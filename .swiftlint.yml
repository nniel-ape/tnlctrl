# SwiftLint Configuration for TunnelMaster

included:
  - TunnelMaster
  - TunnelMasterHelper

excluded:
  - .build
  - DerivedData
  - "**/.build"
  - TunnelMasterTests

# Rules configuration
disabled_rules:
  - trailing_comma  # Allow trailing commas
  - todo  # Allow TODO/FIXME comments during development
  - orphaned_doc_comment  # Can be noisy with structured comments

opt_in_rules:
  - force_unwrapping
  - array_init
  - closure_end_indentation
  - closure_spacing
  - collection_alignment
  - contains_over_filter_count
  - contains_over_filter_is_empty
  - contains_over_first_not_nil
  - contains_over_range_nil_comparison
  - discouraged_object_literal
  - empty_collection_literal
  - empty_count
  - empty_string
  - enum_case_associated_values_count
  - explicit_init
  - extension_access_modifier
  - fallthrough
  - fatal_error_message
  - file_name_no_space
  - first_where
  - flatmap_over_map_reduce
  - identical_operands
  - implicit_return
  - joined_default_parameter
  - last_where
  - legacy_multiple
  - literal_expression_end_indentation
  - lower_acl_than_parent
  - modifier_order
  - multiline_arguments
  - multiline_function_chains
  - multiline_literal_brackets
  - multiline_parameters
  - operator_usage_whitespace
  - overridden_super_call
  - override_in_extension
  - pattern_matching_keywords
  - prefer_self_type_over_type_of_self
  - prefer_zero_over_explicit_init
  - private_action
  - private_outlet
  - prohibited_super_call
  - reduce_into
  - redundant_nil_coalescing
  - redundant_type_annotation
  - single_test_class
  - sorted_first_last
  - static_operator
  - strong_iboutlet
  - toggle_bool
  - unavailable_function
  - unneeded_parentheses_in_closure_argument
  - unowned_variable_capture
  - untyped_error_in_catch
  - vertical_parameter_alignment_on_call
  - vertical_whitespace_closing_braces
  - yoda_condition

# Length rules
line_length:
  warning: 140
  error: 200
  ignores_comments: true
  ignores_urls: true

file_length:
  warning: 600
  error: 1500
  ignore_comment_only_lines: true

type_body_length:
  warning: 400
  error: 1200

function_body_length:
  warning: 80
  error: 150

# Naming rules
identifier_name:
  min_length:
    warning: 2
    error: 1
  max_length:
    warning: 50
    error: 60
  validates_start_with_lowercase: error
  allowed_symbols:
    - _
  excluded:
    - id
    - ip
    - x
    - y
    - i
    - j
    - k
    - n
    - to
    - ok
    - db
    - on_failure      # Docker API naming
    - unless_stopped  # Docker API naming

type_name:
  min_length:
    warning: 3
    error: 1
  max_length:
    warning: 50
    error: 60

# Nesting
nesting:
  type_level:
    warning: 2
  function_level:
    warning: 3

# Cyclomatic complexity
cyclomatic_complexity:
  warning: 15
  error: 25
  ignores_case_statements: true

# Large tuple
large_tuple:
  warning: 4
  error: 5

# Force rules - warn but don't error (during development)
force_cast: warning
force_try: warning
force_unwrapping:
  severity: warning
  excluded:
    - ".*Tests\\.swift$"
    - ".*/Tests/.*"
    - ".*/TunnelMasterTests/.*"

# Vertical whitespace
vertical_whitespace:
  max_empty_lines: 2

# Trailing whitespace
trailing_whitespace:
  ignores_empty_lines: true
  ignores_comments: true

# Custom rules
custom_rules:
  no_print_in_production:
    name: "No print() in production code"
    regex: '^\s*print\s*\('
    match_kinds:
      - identifier
    message: "Use os_log or Logger instead of print()"
    severity: warning
    excluded: ".*Tests?\\.swift$"
