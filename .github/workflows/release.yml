name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build unsigned release
    runs-on: macos-26

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s "$(ls -d /Applications/Xcode*.app | sort -V | tail -1)/Contents/Developer"

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Download sing-box
        run: bash Scripts/download-sing-box.sh

      - name: Build
        run: |
          xcodebuild build \
            -project tnl_ctrl.xcodeproj \
            -target tnl_ctrl \
            -configuration Release \
            SYMROOT="$(pwd)/build" \
            ARCHS=arm64 \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_ENTITLEMENTS="" \
            DEVELOPMENT_TEAM="" \
            MARKETING_VERSION="${{ steps.version.outputs.version }}"

      - name: Package zip
        run: |
          ditto -c -k --keepParent "build/Release/tnl_ctrl.app" "tnl_ctrl-${{ steps.version.outputs.version }}-arm64.zip"

      - name: Download Sparkle
        run: |
          SPARKLE_VERSION=$(curl -s https://api.github.com/repos/sparkle-project/Sparkle/releases/latest | python3 -c "import sys,json; print(json.load(sys.stdin)['tag_name'])")
          curl -sL "https://github.com/sparkle-project/Sparkle/releases/download/${SPARKLE_VERSION}/Sparkle-${SPARKLE_VERSION}.tar.xz" -o sparkle.tar.xz
          mkdir -p sparkle && tar xf sparkle.tar.xz -C sparkle

      - name: Sign and generate appcast
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          mkdir -p release_artifacts
          cp "tnl_ctrl-${{ steps.version.outputs.version }}-arm64.zip" release_artifacts/
          echo "$SPARKLE_PRIVATE_KEY" > /tmp/sparkle_key
          sparkle/bin/generate_appcast \
            --ed-key-file /tmp/sparkle_key \
            --download-url-prefix "https://github.com/nniel-ape/tnlctrl/releases/download/${{ github.ref_name }}/" \
            release_artifacts/
          rm -f /tmp/sparkle_key

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: tnl_ctrl ${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: tnl_ctrl-${{ steps.version.outputs.version }}-arm64.zip

      - name: Update appcast in repo
        run: |
          cp release_artifacts/appcast.xml appcast.xml
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add appcast.xml
          git commit -m "chore: update appcast for ${{ github.ref_name }}" || true
          git push origin HEAD:main
